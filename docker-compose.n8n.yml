services:
  n8n:
    image: n8nio/n8n:latest
    container_name: tkif_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENCRYPTION_KEY=change_this_in_production
      - TZ=Asia/Baghdad
    volumes:
      - ./n8n/.data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    restart: unless-stopped
